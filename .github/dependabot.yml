version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      mcp:
        patterns: ["mcp"]
      db:
        patterns: ["aiosqlite"]
      test:
        patterns: ["pytest", "pytest-*"]
      lint:
        patterns: ["ruff"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
