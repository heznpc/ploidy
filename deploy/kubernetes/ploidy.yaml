# Plain-kubernetes manifest for Ploidy. Single-file install, no Helm required.
#
# Apply with: kubectl apply -f deploy/kubernetes/ploidy.yaml
#
# SQLite singleton — do not scale replicas past 1 without swapping the state
# backend. See deploy/helm/ploidy for a fully parameterised chart.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ploidy
  labels:
    app.kubernetes.io/name: ploidy
---
apiVersion: v1
kind: Secret
metadata:
  name: ploidy
  labels:
    app.kubernetes.io/name: ploidy
type: Opaque
stringData:
  # Fill these in before applying, or leave blank to run without auth.
  PLOIDY_AUTH_TOKEN: ""
  PLOIDY_TOKENS: ""
  PLOIDY_API_KEY: ""
  PLOIDY_DASH_TOKEN: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ploidy
  labels:
    app.kubernetes.io/name: ploidy
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ploidy
  labels:
    app.kubernetes.io/name: ploidy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8765
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: ploidy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ploidy
  labels:
    app.kubernetes.io/name: ploidy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ploidy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ploidy
    spec:
      serviceAccountName: ploidy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ploidy
          image: ghcr.io/heznpc/ploidy:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: PLOIDY_TRANSPORT
              value: "streamable-http"
            - name: PLOIDY_PORT
              value: "8765"
            - name: PLOIDY_DB_PATH
              value: "/data/ploidy.db"
            - name: PLOIDY_LOG_LEVEL
              value: "INFO"
            - name: PLOIDY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ploidy
                  key: PLOIDY_AUTH_TOKEN
                  optional: true
            - name: PLOIDY_TOKENS
              valueFrom:
                secretKeyRef:
                  name: ploidy
                  key: PLOIDY_TOKENS
                  optional: true
            - name: PLOIDY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ploidy
                  key: PLOIDY_API_KEY
                  optional: true
            - name: PLOIDY_DASH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ploidy
                  key: PLOIDY_DASH_TOKEN
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ploidy
        - name: tmp
          emptyDir: {}
