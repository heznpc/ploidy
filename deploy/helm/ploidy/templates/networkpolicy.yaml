{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ploidy.fullname" . }}
  labels: {{- include "ploidy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "ploidy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Same namespace pods can always reach the service.
        - podSelector: {}
        {{- range .Values.networkPolicy.allowFromNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
      ports:
        - port: http
          protocol: TCP
{{- end }}
